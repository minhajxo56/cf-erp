name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Adjust to match your server's PHP version

      - name: 📦 Install PHP Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Adjust to your preferred Node version

      - name: 🛠️ Install and Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: 🚀 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          # The directory on your cPanel server to deploy to. 
          # Leave as / if your FTP account is already restricted to the correct folder.
          server-dir: /
          # Exclude files you don't want on production
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            .env.example
            README.md
            phpunit.xml
